# Full trustless Mina stack on mesa-mut — light node + indexer + verifier (+ adapter).
#
#   cd deploy && docker compose -f docker-compose.stack.yml up -d --build
#
# Joins the existing `trustless` docker network so it integrates with an already-running
# mina-indexer / mina-verifier (started by the indexer session). The indexer service here
# REUSES the existing data bind-mount (db + blocks) — so it continues from where it is,
# no re-bootstrap from genesis. If the indexer/verifier are already running outside
# compose, leave their services commented and only the light-node (+ adapter) come up on
# the shared network.
#
# Services / ports (internal to the `trustless` network unless published):
#   light-node   :8645  this repo — trustless p2p verify + proof-anchored reads/submit
#   indexer      :8080  Granola mina-indexer — mesa block/ledger data (GraphQL)
#   verifier     :8090  mina-verify-server — ab84160 block-proof sidecar
#   minamesh     :3000  Rosetta/Mesh adapter (optional)

networks:
  trustless:
    external: true            # the network the indexer/verifier already run on
    name: trustless

services:
  light-node:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: mina-light-node:mesa
    environment:
      MINA_NETWORK: mesa-mut
      MINA_VK_JSON: /vk/mesa_vk.json
      # Tip source = the indexer's precomputed blocks (reuse its data, no p2p bootstrap).
      # The light node verifies each block's proof before adopting it — still trustless.
      LIGHT_NODE_BLOCKS_DIR: /indexer-blocks
      LIGHT_NODE_HTTP_ADDR: 0.0.0.0:8645
      RUST_LOG: mina_light_node=info,mina_relay=warn
    volumes:
      - ./mesa_vk.json:/vk/mesa_vk.json:ro
      # Reuse the indexer's already-downloaded blocks (read-only).
      - ${INDEXER_DATA:-/home/darek/work/o1labs/mina-indexer/data}/blocks:/indexer-blocks:ro
    networks: [trustless]
    ports:
      - "8645:8645"
    restart: unless-stopped

  # Granola mina-indexer — reuses the existing data dir (no re-ingest). Leave commented if
  # it is already running outside compose on the `trustless` network.
