# Mina light node — joins p2p (mina-relay) + verifies every tip (mina-verify),
# in-process. No sidecar, no runtime configuration.
#
# One process follows exactly ONE network: the libp2p pnet key is derived from the
# chain id (a devnet swarm can't even decrypt mainnet traffic) and Mina's network
# config is process-global. So it's one container per network — and the network is
# baked into the image at build time (--build-arg MINA_NETWORK), so the running
# container needs no environment at all.
#
#   docker compose -f deploy/docker-compose.yml up --build            # devnet (default)
#   docker compose -f deploy/docker-compose.yml --profile mainnet up  # mainnet
#
# Query surface: GET http://localhost:8080/tip and /healthz (devnet),
#                GET http://localhost:8081/tip and /healthz (mainnet).
services:
  devnet:
    image: mina-light-node:devnet
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        MINA_NETWORK: devnet
    ports:
      - "8080:8080"
    restart: unless-stopped

  mainnet:
    image: mina-light-node:mainnet
    profiles: ["mainnet"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        MINA_NETWORK: mainnet
    ports:
      - "8081:8080"
    restart: unless-stopped
